<!-- HTMX partial: appended to #chat-messages after each question -->

<!-- User message -->
<div class="flex justify-end">
  <div class="max-w-[70%] rounded-2xl rounded-br-md bg-aegis-600 px-4 py-3 text-sm text-white">
    {{ question }}
  </div>
</div>

<!-- Aegis answer -->
<div class="flex justify-start">
  <div class="max-w-[70%]">
    <div class="rounded-2xl rounded-bl-md bg-gray-100 px-4 py-3 text-sm text-gray-800 whitespace-pre-wrap">{{ answer }}</div>
    {% if sources %}
    <div class="mt-1.5 flex flex-wrap gap-1.5">
      {% for src in sources %}
        {% if src.url %}
        <a href="{{ src.url }}" class="inline-flex items-center gap-1 rounded-full bg-gray-50 border border-gray-200 px-2 py-0.5 text-xs text-gray-500 hover:bg-gray-100 hover:text-gray-700 transition-colors">
          {{ src.ref }}
          <span class="text-gray-400">{{ src.source_type }}</span>
          <span class="truncate max-w-[120px]">{{ src.label }}</span>
        </a>
        {% else %}
        <span class="inline-flex items-center gap-1 rounded-full bg-gray-50 border border-gray-200 px-2 py-0.5 text-xs text-gray-400">
          {{ src.ref }} {{ src.source_type }} — {{ src.label[:40] }}
        </span>
        {% endif %}
      {% endfor %}
    </div>
    {% endif %}
  </div>
</div>

<!-- Update session_id hidden field for continuity -->
{% if session_id %}
<script>
  (function() {
    var input = document.querySelector('input[name="session_id"]');
    if (input) input.value = "{{ session_id }}";
  })();
</script>
{% endif %}
