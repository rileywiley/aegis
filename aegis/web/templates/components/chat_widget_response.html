<!-- HTMX partial: chat widget response in dashboard sidebar -->
{% if answer %}
<div class="rounded-lg bg-gray-50 px-3 py-2 text-sm text-gray-800 whitespace-pre-wrap">{{ answer }}</div>
{% if sources %}
<div class="mt-1 flex flex-wrap gap-1">
  {% for src in sources %}
    {% if src.url %}
    <a href="{{ src.url }}" class="text-xs text-aegis-600 hover:text-aegis-800 underline">{{ src.ref }}</a>
    {% else %}
    <span class="text-xs text-gray-400">{{ src.ref }}</span>
    {% endif %}
  {% endfor %}
</div>
{% endif %}
{% else %}
<p class="text-xs text-gray-400 italic">Type a question and press Enter.</p>
{% endif %}
