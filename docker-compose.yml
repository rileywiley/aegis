# docker-compose.yml
services:
  aegis-db:
    image: pgvector/pgvector:pg16
    container_name: aegis-db
    ports:
      - "5434:5432"
    environment:
      POSTGRES_DB: aegis
      POSTGRES_HOST_AUTH_METHOD: trust
    volumes:
      - aegis_pgdata:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  aegis_pgdata: